<style>
  :root{
    --bg:#F4F3EE; --surface:#FFFFFF; --sidebar:#191D1A; --sidebar-soft:#262B27;
    --ink:#1E2421; --muted:#6C726B; --faint:#9AA098; --line:#E6E4DC; --line-2:#D7D5CB;
    --accent:#14695C; --accent-2:#0E5347; --accent-soft:#E4EFEC;
    --st-new:#8A8F88; --st-new-bg:#EEEEEA;
    --st-progress:#2D6CDF; --st-progress-bg:#E7EFFB;
    --st-overdue:#C24A3B; --st-overdue-bg:#FAE8E5;
    --st-done:#2E8B57; --st-done-bg:#E5F3EA;
    --danger:#C24A3B; --danger-bg:#FAE8E5;
    --r:10px; --r-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Onest',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,.brand{font-family:'Golos Text','Onest',sans-serif;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:14px}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfcdc3;border-radius:9px}

  .app{display:grid;grid-template-columns:226px 1fr;min-height:100vh}

  /* Sidebar */
  .side{background:var(--sidebar);color:#D7DAD6;padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .brand{color:#fff;font-size:19px;display:flex;align-items:center;gap:10px;padding:0 8px 18px}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;font-size:16px}
  .nav-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#7B817C;padding:14px 10px 6px}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#C2C7C2;font-size:14px;transition:.15s;width:100%;text-align:left}
  .nav svg{width:18px;height:18px;flex:none}
  .nav:hover{background:var(--sidebar-soft);color:#fff}
  .nav.on{background:var(--accent);color:#fff}
  .side .spacer{flex:1}
  .side .ftr{font-size:11.5px;color:#71776F;padding:8px 10px;border-top:1px solid #2A2F2B;margin-top:8px;line-height:1.6}

  /* Main */
  .main{padding:26px 30px 40px;min-width:0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .top h1{font-size:23px}
  .top .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--accent);color:#fff;padding:10px 16px;border-radius:var(--r);font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn:hover{background:var(--accent-2)}
  .btn svg{width:16px;height:16px}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line-2)}
  .btn.ghost:hover{background:#fbfbf9;border-color:var(--faint)}
  .btn.sm{padding:7px 12px;font-size:13px}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px}
  .stat .lbl{color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:7px}
  .stat .lbl svg{width:15px;height:15px}
  .stat .num{font-family:'Golos Text';font-size:30px;font-weight:600;margin-top:6px;line-height:1}
  .stat .num.r{color:var(--danger)} .stat .num.g{color:var(--st-done)}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px}
  .panel h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}

  /* task rows */
  .trow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .trow:last-child{border-bottom:none}
  .trow .grow{flex:1;min-width:0}
  .trow .t-title{font-weight:500;font-size:14px;display:flex;align-items:center;gap:8px}
  .trow .t-meta{color:var(--muted);font-size:12px;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .chip{font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .pdot{width:8px;height:8px;border-radius:50%;flex:none}
  .ava{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11.5px;font-weight:600;flex:none}

  .wl{display:flex;flex-direction:column;gap:14px}
  .wl .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .bar{height:7px;background:#EFEEE8;border-radius:20px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:20px}

  /* toolbar */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .seg{display:inline-flex;background:#ECEBE4;border-radius:10px;padding:3px}
  .seg button{padding:7px 13px;border-radius:8px;color:var(--muted);font-weight:500;font-size:13px;display:flex;align-items:center;gap:6px}
  .seg button svg{width:15px;height:15px}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .fld{padding:8px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);min-width:140px}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}

  /* list table */
  .list .trow:hover{background:#FBFBF8}
  .list .trow{padding-left:8px;padding-right:8px;border-radius:8px;cursor:pointer}

  /* kanban */
  .kb{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  .kcol{background:#EFEEE8;border-radius:var(--r-lg);padding:12px;min-height:120px;transition:.15s}
  .kcol.drag{outline:2px dashed var(--accent);background:#E9F0EE}
  .kcol .kh{display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:13px;margin-bottom:11px;padding:0 4px}
  .kcol .kh .cnt{background:#fff;color:var(--muted);font-size:11px;padding:1px 8px;border-radius:20px}
  .kcard{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:grab}
  .kcard:active{cursor:grabbing}
  .kcard .kt{font-weight:500;font-size:13.5px;margin-bottom:8px}
  .kcard .kf{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .kcard .kdate{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .kcard.over .kdate{color:var(--danger);font-weight:500}

  /* calendar */
  .cal-h{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .cal-h .mn{font-size:17px;font-weight:600;min-width:170px;text-align:center}
  .nav-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface);display:grid;place-items:center}
  .nav-btn:hover{background:#f6f6f3}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal .dow{text-align:center;font-size:11.5px;color:var(--muted);font-weight:500;padding:4px 0}
  .cell{background:var(--surface);border:1px solid var(--line);border-radius:9px;min-height:96px;padding:7px}
  .cell.off{background:#f7f6f1;opacity:.55}
  .cell.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .cell .dn{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
  .cell.today .dn{color:var(--accent)}
  .cev{font-size:11px;padding:3px 6px;border-radius:6px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-left:3px solid}

  /* employees */
  .emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
  .emp-card .eh{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .emp-card .eh .nm{font-weight:600;font-size:15px}
  .emp-card .eh .rl{color:var(--muted);font-size:12.5px}
  .emp-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .emp-stats .b{background:#F7F6F1;border-radius:9px;padding:9px 11px}
  .emp-stats .b .v{font-family:'Golos Text';font-size:19px;font-weight:600}
  .emp-stats .b .k{font-size:11.5px;color:var(--muted)}

  /* projects */
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .proj-card{border-left:4px solid;cursor:pointer}
  .proj-card:hover{background:#fbfbf8}

  /* charts */
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .chart-box{position:relative;height:260px}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(25,29,26,.5);display:none;align-items:flex-start;justify-content:center;padding:50px 18px;z-index:50;overflow:auto}
  .ov.show{display:flex}
  .modal{background:var(--surface);border-radius:var(--r-lg);width:100%;max-width:540px;padding:24px}
  .modal h2{font-size:18px;margin-bottom:18px}
  .frm label{display:block;font-size:12.5px;color:var(--muted);font-weight:500;margin:13px 0 5px}
  .frm input,.frm select,.frm textarea{width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:#fff}
  .frm textarea{resize:vertical;min-height:64px}
  .frm input:focus,.frm select:focus,.frm textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .frm .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-ftr{display:flex;justify-content:space-between;gap:10px;margin-top:22px}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
  .empty svg{width:36px;height:36px;color:var(--faint);margin-bottom:10px}
  .iconbtn{color:var(--faint);padding:5px;border-radius:7px}
  .iconbtn:hover{background:#f0efe9;color:var(--ink)}
  .iconbtn svg{width:16px;height:16px;display:block}
  .iconbtn.adv{color:var(--accent)}
  .iconbtn.adv:hover{background:var(--accent-soft);color:var(--accent-2)}

  /* mobile bottom navigation */
  .mobnav{display:none}

  @media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.charts{grid-template-columns:1fr}}
  @media(max-width:920px){
    .app{grid-template-columns:1fr}
    .side{display:none}
    .main{padding:20px 16px 90px}
    .top h1{font-size:20px}
    .kb{grid-template-columns:1fr;gap:16px}
    .cal{gap:5px}
    .cell{min-height:66px;padding:5px}
    .cell .dn{font-size:11px;margin-bottom:3px}
    .cev{font-size:10px;padding:2px 5px}
    .cards{gap:10px}
    .card{padding:14px}
    .stat .num{font-size:26px}
    .iconbtn{padding:9px}
    .nav-btn{width:40px;height:40px}
    .ov{padding:0;align-items:flex-end}
    .modal{max-width:none;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto}
    .mobnav{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--sidebar);padding:8px 6px;padding-bottom:max(8px,env(safe-area-inset-bottom));justify-content:space-around;z-index:40;box-shadow:0 -2px 18px rgba(0,0,0,.18)}
    .mobnav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:#9AA29B;font-size:10.5px;font-weight:500;padding:6px 4px;border-radius:11px;flex:1;max-width:84px}
    .mobnav button svg{width:21px;height:21px}
    .mobnav button.on{background:var(--accent);color:#fff}
  }
  @media(max-width:560px){.cards{grid-template-columns:1fr 1fr}.cal-h .mn{min-width:110px;font-size:15px}.cal .dow{font-size:10px}.top .btn{padding:9px 13px}}
</style>

<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot">✔</span>Бошқарув</div>
    <div class="nav-h">Бошқарув</div>
    <button class="nav on" data-view="dashboard"></button>
    <button class="nav" data-view="tasks"></button>
    <button class="nav" data-view="projects"></button>
    <div class="nav-h">Таҳлил</div>
    <button class="nav" data-view="employees"></button>
    <button class="nav" data-view="reports"></button>
    <div class="spacer"></div>
    <div class="ftr">Раҳбар режими.<br><span id="sync-status" style="font-size:12px"></span></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<nav class="mobnav" id="mobnav"></nav>

<div class="ov" id="ov"></div>

<script>
/* ---------- icons ---------- */
const I = {
  dashboard:'<path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 21h8v-6H3z"/>',
  tasks:'<path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',

  search:'<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>',

  board:'<path d="M3 3h7v18H3zM14 3h7v11h-7z"/>',

  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  fire:'<path d="M12 2s4 4 4 9a4 4 0 0 1-8 0c0-2 1-3 1-3s3 1 3-6z"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22V15"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/>',
  trash:'<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  left:'<path d="M15 18l-6-6 6-6"/>', right:'<path d="M9 18l6-6-6-6"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2M5.5 5h13l3.5 7v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z"/>',

  refresh:'<path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/>'
};
const svg=(p,w=18)=>'<svg width="'+w+'" height="'+w+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';

/* ---------- labels ---------- */
const NAV={dashboard:'Бошқарув панели',tasks:'Топшириқлар',projects:'Лойиҳалар',employees:'Ходимлар',reports:'Ҳисоботлар'};
const MNAV={dashboard:'Панел',tasks:'Топшириқ',projects:'Лойиҳа',employees:'Ходим',reports:'Ҳисобот'};
const STATUS=[

function sbHeaders(){return {'apikey':sb.key,'Authorization':'Bearer '+sb.key};}
async function sbPull(){

async function sbPush(data){
  const r=await fetch(sb.url+'/rest/v1/boshqaruv_state?on_conflict=id',{
    method:'POST',
    headers:Object.assign(sbHeaders(),{'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'}),
    body:JSON.stringify([{id:1,data:data,updated_at:new Date().toISOString()}])
  });
  if(!r.ok)throw new Error('push '+r.status);
}
function schedulePush(){
  if(!sb)return;

}

  if(syncState==='error')return {t:'☁ уланиш йўқ',c:'#b97b5e'};
  if(syncState==='synced')return {t:'☁ синхрон',c:'#8fb3a6'};
  return {t:'☁ уланмоқда…',c:'#8a8f88'};
}

async function load(){
  const v=lsGet();
  let haveLocal=false;
  if(v){try{S=JSON.parse(v);haveLocal=Array.isArray(S.tasks);}catch(e){}}
  if(sb){
    try{
      const remote=await sbPull();
      if(remote&&Array.isArray(remote.tasks)){S=remote;lsSet(JSON.stringify(S));setSync('synced');return;}
      if(haveLocal){await sbPush(S);setSync('synced');return;}
      seed();await save();setSync('synced');return;
    }catch(e){setSync('error');}
  }
  if(haveLocal)return;
  try{const r=await window.storage.get(KEY);if(r&&r.value){S=JSON.parse(r.value);lsSet(r.value);return;}}catch(e){}
  if(mem){S=mem;return;}
  seed();await save();
}
async function save(){
  mem=S;const str=JSON.stringify(S);
  lsSet(str);
  try{await window.storage.set(KEY,str);}catch(e){}
  schedulePush();
}

/* ---------- tasks view ---------- */
function filtered(){
  return S.tasks.filter(t=>{
    if(filter.status&&dStatus(t)!==filter.status)return false;
    if(filter.emp&&t.assignee!==filter.emp)return false;
    if(filter.proj&&t.project!==filter.proj)return false;
    if(filter.q&&!(t.title+' '+(t.desc||'')).toLowerCase().includes(filter.q.toLowerCase()))return false;
    return true;
  });
}
function sortTasks(arr){
  const a=[...arr];
  const si=t=>STATUS.findIndex(x=>x.id===dStatus(t));
  const pi=p=>PRIO.findIndex(x=>x.id===p);
  const dl=t=>t.deadline||'9999';
  if(sort==='status')a.sort((x,y)=>si(x)-si(y)||dl(x).localeCompare(dl(y)));
  else if(sort==='priority')a.sort((x,y)=>pi(y.priority)-pi(x.priority)||dl(x).localeCompare(dl(y)));
  else if(sort==='name')a.sort((x,y)=>x.title.localeCompare(y.title,'ru'));
  else a.sort((x,y)=>dl(x).localeCompare(dl(y)));
  return a;
}

function hexA(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}

function tasksCalendar(){
  const y=calRef.getFullYear(),mo=calRef.getMonth();
  const first=new Date(y,mo,1);
  let start=(first.getDay()+6)%7; // monday-based
  const dim=new Date(y,mo+1,0).getDate();
  const ts=filtered();
  const head='<div class="cal-h"><button class="nav-btn" data-cal="-1">'+svg(I.left,16)+'</button>'+
    '<div class="mn">'+MONTHS[mo]+' '+y+'</div>'+
    '<button class="nav-btn" data-cal="1">'+svg(I.right,16)+'</button>'+
    '<button class="btn ghost sm" data-cal="0">Бугун</button></div>';
  let cells=DOW.map(d=>'<div class="dow">'+d+'</div>').join('');
  for(let i=0;i<start;i++)cells+='<div class="cell off"></div>';
  for(let d=1;d<=dim;d++){
    const ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const evs=ts.filter(t=>t.deadline===ds);
    const isToday=ds===todayStr();
    const evHtml=evs.slice(0,3).map(t=>{
      const col=isOverdue(t)?'var(--danger)':(STMAP[t.status]?'var(--'+STMAP[t.status].c+')':'#999');
      return '<div class="cev" style="border-left-color:'+col+';background:'+hexAfromVar(t)+'" data-edit="'+t.id+'">'+esc(t.title)+'</div>';
    }).join('')+(evs.length>3?'<div style="font-size:11px;color:var(--muted)">+'+(evs.length-3)+' та</div>':'');
    cells+='<div class="cell'+(isToday?' today':'')+'"><div class="dn">'+d+'</div>'+evHtml+'</div>';
  }
  return head+'<div class="cal">'+cells+'</div>';
}
function hexAfromVar(t){
  const map={new:'#EEEEEA',progress:'#E7EFFB',done:'#E5F3EA'};
  return isOverdue(t)?'#FAE8E5':(map[t.status]||'#f3f2ec');

    const ts=S.tasks.filter(t=>t.assignee===e.id);
    const done=ts.filter(t=>t.status==='done').length;
    const over=ts.filter(isOverdue).length;
    const pct=ts.length?Math.round(done/ts.length*100):0;
    const active=ts.length-done;
    return '<div class="card panel emp-card">'+
      '<div class="eh">'+avatar(e).replace('class="ava"','class="ava" style="width:42px;height:42px;font-size:15px;background:'+e.color+'"')+
      '<div style="flex:1"><div class="nm">'+esc(e.name)+'</div><div class="rl">'+esc(e.role||'—')+'</div></div>'+
      '<button class="iconbtn" data-del-emp="'+e.id+'">'+svg(I.trash,16)+'</button></div>'+
      '<div class="emp-stats">'+
        estat('Жами',ts.length)+estat('Фаол',active)+
        estat('Бажарилди',done)+estat('Муддати ўтган',over,over>0?'var(--danger)':'')+
      '</div>'+
      '<div class="row" style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span style="color:var(--muted)">Бажарилиш фоизи</span><span style="font-weight:600">'+pct+'%</span></div>'+
      '<div class="bar"><i style="width:'+pct+'%;background:'+e.color+'"></i></div></div>';
  }).join('');
  return header('Ходимлар',S.employees.length+' та ходим',btn)+'<div class="emp-grid">'+cards+'</div>';
}
function estat(k,v,c){return '<div class="b"><div class="v"'+(c?' style="color:'+c+'"':'')+'>'+v+'</div><div class="k">'+k+'</div></div>';}

  charts.push(new Chart(document.getElementById('c-status'),{type:'doughnut',data:{
    labels:STATUS.map(s=>s.label),
    datasets:[{data:STATUS.map(s=>t.filter(x=>dStatus(x)===s.id).length),
      backgroundColor:['#8A8F88','#2D6CDF','#C24A3B','#2E8B57'],borderWidth:2,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom'}},cutout:'60%',maintainAspectRatio:false}}));
  // employees
  charts.push(new Chart(document.getElementById('c-emp'),{type:'bar',data:{
    labels:S.employees.map(e=>e.name.split(' ')[0]),

      {label:'Бажарилди',data:S.employees.map(e=>t.filter(x=>x.assignee===e.id&&x.status==='done').length),backgroundColor:'#2E8B57'},
      {label:'Фаол',data:S.employees.map(e=>t.filter(x=>x.assignee===e.id&&x.status!=='done').length),backgroundColor:'#2D6CDF'}
    ]},options:{plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{precision:0}}},maintainAspectRatio:false}}));
  // projects
  charts.push(new Chart(document.getElementById('c-proj'),{type:'bar',data:{
    labels:S.projects.map(p=>p.name),
    datasets:[{label:'Топшириқлар',data:S.projects.map(p=>t.filter(x=>x.project===p.id).length),
      backgroundColor:S.projects.map(p=>p.color),borderRadius:6}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{precision:0},grid:{color:'#eee'}},y:{grid:{display:false}}},maintainAspectRatio:false}}));
  // priority
  charts.push(new Chart(document.getElementById('c-prio'),{type:'doughnut',data:{
    labels:PRIO.map(p=>p.label),

      backgroundColor:PRIO.map(p=>p.color),borderWidth:2,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom'}},cutout:'60%',maintainAspectRatio:false}}));

function rcard(k,v){return '<div style="flex:1;background:#F4F3EE;border-radius:10px;padding:12px 14px"><div style="font-size:12px;color:#6C726B">'+k+'</div><div style="font-family:Golos Text,sans-serif;font-size:22px;font-weight:600;margin-top:2px">'+v+'</div></div>';}

      '<td style="'+td+';white-space:nowrap">'+fmtDate(x.deadline)+'</td></tr>';

      '<div style="text-align:right;color:#6C726B;font-size:13px">'+fmtFull(new Date())+'</div></div>'+

    (t.length?'<table style="width:100%;border-collapse:collapse;font-size:13px">'+

async function exportPDF(){
  if(typeof html2canvas==='undefined'||!window.jspdf){alert('Кутубхона юкланмади. Интернет уланишини текширинг ва қайта уриниб кўринг.');return;}
  const el=buildReport();document.body.appendChild(el);
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff'});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    const m=10,iw=pw-m*2,ih=canvas.height*iw/canvas.width;
    if(ih<=ph-m*2){pdf.addImage(canvas.toDataURL('image/png'),'PNG',m,m,iw,ih);}
    else{
      const pagePx=(ph-m*2)*canvas.width/iw;let sY=0,first=true;
      while(sY<canvas.height){
        const sh=Math.min(pagePx,canvas.height-sY);
        const slice=document.createElement('canvas');slice.width=canvas.width;slice.height=sh;
        slice.getContext('2d').drawImage(canvas,0,sY,canvas.width,sh,0,0,canvas.width,sh);
        if(!first)pdf.addPage();first=false;
        pdf.addImage(slice.toDataURL('image/png'),'PNG',m,m,iw,sh*iw/canvas.width);
        sY+=sh;
      }
    }
    pdf.save('vazifa-hisobot.pdf');
  }catch(e){alert('PDF яратишда хатолик юз берди.');}
  finally{el.remove();}
}

/* ---------- binding ---------- */
function bind(){
  document.querySelectorAll('[data-act="new-task"]').forEach(b=>b.onclick=()=>{if(!S.employees.length||!S.projects.length){alert('Аввал камида битта ходим ва лойиҳа қўшинг.');return;}taskModal(null);});
  document.querySelectorAll('[data-act="new-emp"]').forEach(b=>b.onclick=()=>empModal());
  document.querySelectorAll('[data-act="new-proj"]').forEach(b=>b.onclick=()=>projModal());
  document.querySelectorAll('[data-act="export"]').forEach(b=>b.onclick=async()=>{const o=b.innerHTML;b.disabled=true;b.style.opacity=.6;b.innerHTML='PDF тайёрланмоқда...';await exportPDF();b.innerHTML=o;b.disabled=false;b.style.opacity=1;});
  setSync(syncState);

  document.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',ev=>{
    if(ev.target.closest('[data-del-proj],[data-del-emp],[data-adv]'))return;
    taskModal(el.dataset.edit);
  }));
  document.querySelectorAll('[data-adv]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();advance(b.dataset.adv);});
  document.querySelectorAll('[data-tv]').forEach(b=>b.onclick=()=>{taskView=b.dataset.tv==='cal'?'cal':b.dataset.tv;render();});
  const fq=document.getElementById('f-q');if(fq)fq.oninput=()=>{filter.q=fq.value;const a=document.activeElement;render();const n=document.getElementById('f-q');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);}};
  const fe=document.getElementById('f-emp');if(fe)fe.onchange=()=>{filter.emp=fe.value;render();};
  const fp=document.getElementById('f-proj');if(fp)fp.onchange=()=>{filter.proj=fp.value;render();};
  const fst=document.getElementById('f-status');if(fst)fst.onchange=()=>{filter.status=fst.value;render();};

  document.querySelectorAll('[data-cal]').forEach(b=>b.onclick=()=>{
    const v=+b.dataset.cal;if(v===0)calRef=new Date();else calRef.setMonth(calRef.getMonth()+v);render();
  });
  document.querySelectorAll('[data-del-proj]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();if(confirm('Лойиҳа ўчирилсинми? Унга боғлиқ топшириқлар лойиҳасиз қолади.')){S.tasks.forEach(t=>{if(t.project===b.dataset.delProj)t.project='';});S.projects=S.projects.filter(p=>p.id!==b.dataset.delProj);save();render();}});
  document.querySelectorAll('[data-del-emp]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();if(confirm('Ходим ўчирилсинми?')){S.tasks.forEach(t=>{if(t.assignee===b.dataset.delEmp)t.assignee='';});S.employees=S.employees.filter(e=>e.id!==b.dataset.delEmp);save();render();}});
  document.querySelectorAll('[data-proj-open]').forEach(b=>b.onclick=()=>{filter.proj=b.dataset.projOpen;filter.emp='';filter.q='';filter.status='';view='tasks';taskView='list';render();});

  if(view==='reports')setTimeout(drawCharts,30);
  if(taskView==='board')bindDnD();
}
function bindModal(){
  const ov=document.getElementById('ov');
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  ov.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  const st=ov.querySelector('[data-save-task]');if(st)st.onclick=()=>saveTask(st.dataset.saveTask);
  const dt=ov.querySelector('[data-del-task]');if(dt)dt.onclick=()=>{if(confirm('Топшириқ ўчирилсинми?')){S.tasks=S.tasks.filter(x=>x.id!==dt.dataset.delTask);save();closeModal();render();}};
  const se=ov.querySelector('[data-save-emp]');if(se)se.onclick=saveEmp;
  const sp=ov.querySelector('[data-save-proj]');if(sp)sp.onclick=saveProj;
}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function saveTask(id){
  const title=val('m-title');if(!title){alert('Топшириқ номини киритинг.');return;}
  const data={title,desc:val('m-desc'),assignee:val('m-emp'),project:val('m-proj'),priority:val('m-prio'),status:val('m-status'),deadline:val('m-deadline')};
  if(id){Object.assign(S.tasks.find(x=>x.id===id),data);}
  else{S.tasks.push({id:uid(),createdAt:todayStr(),...data});}
  save();closeModal();render();
}
function saveEmp(){const name=val('m-name');if(!name){alert('Исмни киритинг.');return;}
  S.employees.push({id:uid(),name,role:val('m-role'),color:PAL[S.employees.length%PAL.length]});save();closeModal();render();}
function saveProj(){const name=val('m-pname');if(!name){alert('Лойиҳа номини киритинг.');return;}
  S.projects.push({id:uid(),name,color:PAL[(S.projects.length+2)%PAL.length]});save();closeModal();render();}

/* ---------- drag & drop ---------- */
function bindDnD(){
  let dragId=null;
  document.querySelectorAll('.kcard').forEach(c=>{
    c.addEventListener('dragstart',e=>{dragId=c.dataset.id;e.dataTransfer.effectAllowed='move';setTimeout(()=>c.style.opacity='.4',0);});
    c.addEventListener('dragend',()=>{c.style.opacity='1';});
  });
  document.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag');
      if(!dragId)return;const t=S.tasks.find(x=>x.id===dragId);const tgt=col.dataset.status;if(t&&tgt!=='overdue'&&t.status!==tgt){t.status=tgt;save();render();}dragId=null;});
  });
}
